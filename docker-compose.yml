services:
  backend:
    container_name: commercehub-backend
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: development
    env_file:
      - backend/.env.example
    environment:
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - commercehub-network

  frontend:
    container_name: commercehub-frontend
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: development
    env_file:
      - frontend/.env.example
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - commercehub-network

  postgres:
    container_name: commercehub-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-commercehub_ai}
      POSTGRES_USER: ${POSTGRES_USER:-commercehub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - commercehub-network

  redis:
    container_name: commercehub-redis
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - commercehub-network

volumes:
  postgres-data:
  redis-data:
  frontend-node-modules:

networks:
  commercehub-network:
    driver: bridge
