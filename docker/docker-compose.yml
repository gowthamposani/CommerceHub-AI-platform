services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://commercehub:commercehub@postgres:5432/commercehub
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173
      ALLOWED_HOSTS: localhost,127.0.0.1,backend,nginx,testserver
      LOG_FILE_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - commercehub
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  celery-worker:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    command: celery -A app.worker.celery_app worker --loglevel=INFO
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://commercehub:commercehub@postgres:5432/commercehub
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      LOG_FILE_ENABLED: "false"
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - commercehub

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_APP_NAME: CommerceHub AI
        VITE_APP_VERSION: 0.1.0
        VITE_APP_ENVIRONMENT: development
        VITE_API_BASE_URL: /api/v1
        VITE_API_TIMEOUT_MS: 30000
    environment:
      VITE_API_BASE_URL: /api/v1
    networks:
      - commercehub

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - commercehub
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: commercehub
      POSTGRES_USER: commercehub
      POSTGRES_PASSWORD: commercehub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - commercehub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commercehub -d commercehub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - commercehub
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  commercehub:
    driver: bridge
