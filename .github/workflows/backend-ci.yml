name: Backend CI

on:
  push:
    branches:
      - develop
      - "feature/**"
  pull_request:
    branches:
      - develop
      - "feature/**"

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/commercehub_test
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/commercehub_test
      JWT_SECRET_KEY: test-secret-key
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      TOKEN_ISSUER: test-commercehub
      TOKEN_AUDIENCE: test-commercehub-web
      DEBUG: "false"
      SQLALCHEMY_ECHO: "false"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: commercehub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install ruff pytest httpx

      - name: Lint backend
        run: python -m ruff check backend/app backend/tests

      - name: Compile backend
        run: python -m compileall backend/app

      - name: Run pytest
        run: |
          mkdir -p test-results
          python -m pytest backend/tests --junitxml=test-results/backend-pytest.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pytest-results
          path: test-results/backend-pytest.xml
          if-no-files-found: warn
          retention-days: 14
