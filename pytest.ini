[pytest]
testpaths =
    backend/tests/unit
    backend/tests/integration
    backend/tests/api
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-config
    --strict-markers
    -p pytest_cov
    -p pytest_asyncio
    --cov=backend/app
    --cov-report=term-missing
required_plugins =
    pytest-asyncio
    pytest-cov
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
pythonpath = .
markers =
    unit: Unit tests with isolated dependencies.
    integration: Integration tests across internal application layers.
    api: API tests using FastAPI TestClient.
